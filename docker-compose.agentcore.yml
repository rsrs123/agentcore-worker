version: "3.8"

services:
  # ─── TEMPORAL DATABASE ───────────────────────────────────────
  temporal-postgresql:
    container_name: temporal-postgresql
    image: postgres:13
    environment:
      POSTGRES_PASSWORD: temporal_secret_2026
      POSTGRES_USER: temporal
      POSTGRES_DB: temporal
    networks:
      - agentcore-network
    volumes:
      - temporal-db:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── TEMPORAL SERVER ─────────────────────────────────────────
  temporal:
    container_name: temporal
    image: temporalio/auto-setup:1.25
    depends_on:
      temporal-postgresql:
        condition: service_healthy
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal_secret_2026
      - POSTGRES_SEEDS=temporal-postgresql
    networks:
      - agentcore-network
    ports:
      - 7233:7233
    restart: unless-stopped

  # ─── TEMPORAL UI ─────────────────────────────────────────────
  temporal-ui:
    container_name: temporal-ui
    image: temporalio/ui:2.31.2
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=https://temporal.agentflowing.com
    networks:
      - agentcore-network
    ports:
      - 8081:8080
    restart: unless-stopped

  # ─── NODE-RED ─────────────────────────────────────────────────
  nodered:
    container_name: nodered
    image: nodered/node-red:latest
    networks:
      - agentcore-network
    ports:
      - 1880:1880
    volumes:
      - nodered-data:/data
    environment:
      - TZ=Europe/Madrid
    restart: unless-stopped

  # ─── AGENTCORE WORKER ─────────────────────────────────────────
  agentcore-worker:
    container_name: agentcore-worker
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - temporal
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - TEMPORAL_ADDRESS=temporal:7233
    networks:
      - agentcore-network
    restart: unless-stopped

networks:
  agentcore-network:
    driver: bridge

volumes:
  temporal-db:
  nodered-data:
