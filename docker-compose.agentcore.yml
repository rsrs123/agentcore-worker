version: "3.8"

# AgentCore OS — Phase 1
# All services connect to Temporal via the exposed host port (72.62.29.17:7233)
# This bypasses Coolify's multi-network DNS resolution issues.

services:
  # ─── TEMPORAL DATABASE ───────────────────────────────────────
  temporal-postgresql:
    image: postgres:13
    environment:
      POSTGRES_PASSWORD: temporal_secret_2026
      POSTGRES_USER: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal-db:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── TEMPORAL SERVER ─────────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:1.25
    depends_on:
      temporal-postgresql:
        condition: service_healthy
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal_secret_2026
      - POSTGRES_SEEDS=temporal-postgresql
    ports:
      - 7233:7233
    restart: unless-stopped

  # ─── TEMPORAL UI ─────────────────────────────────────────────
  temporal-ui:
    image: temporalio/ui:2.31.2
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=${VPS_IP:-72.62.29.17}:7233
      - TEMPORAL_CORS_ORIGINS=https://temporal.agentflowing.com
    ports:
      - 8081:8080
    restart: unless-stopped

  # ─── NODE-RED ─────────────────────────────────────────────────
  nodered:
    image: nodered/node-red:latest
    ports:
      - 1880:1880
    volumes:
      - nodered-data:/data
    environment:
      - TZ=Europe/Madrid
    restart: unless-stopped

  # ─── AGENTCORE WORKER ─────────────────────────────────────────
  agentcore-worker:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - temporal
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - TEMPORAL_ADDRESS=${VPS_IP:-72.62.29.17}:7233
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
    restart: unless-stopped

volumes:
  temporal-db:
  nodered-data:
